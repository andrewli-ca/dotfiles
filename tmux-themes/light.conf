# Catppuccin Latte — tmux light theme
# Palette reference: https://github.com/catppuccin/catppuccin

# Pane borders
set -g pane-border-style "fg=#acb0be"
set -g pane-active-border-style "fg=#1e66f5"

# Status bar
set -g status-style "bg=#e6e9ef,fg=#4c4f69"
set -g status-left "#[bg=#1e66f5,fg=#eff1f5,bold] #S #[bg=#e6e9ef] "
set -g status-right "#[fg=#6c6f85]%Y-%m-%d %H:%M "
set -g status-left-length 30

# Window tabs
set -g window-status-format "#[fg=#6c6f85] #I:#W "
set -g window-status-current-format "#[bg=#ccd0da,fg=#1e66f5,bold] #I:#W "

# Message and command prompt
set -g message-style "bg=#ccd0da,fg=#4c4f69"
set -g mode-style "bg=#ccd0da,fg=#4c4f69"
