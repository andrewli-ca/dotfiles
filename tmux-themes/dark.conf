# Catppuccin Mocha — tmux dark theme
# Palette reference: https://github.com/catppuccin/catppuccin

# Pane borders
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"

# Status bar
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "
set -g status-right "#[fg=#a6adc8]%Y-%m-%d %H:%M "
set -g status-left-length 30

# Window tabs
set -g window-status-format "#[fg=#a6adc8] #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W "

# Message and command prompt
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#313244,fg=#cdd6f4"
